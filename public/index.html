<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="OTS — Order Tracking System Login" />
  <meta name="theme-color" content="#0f1117" />
  <title>OTS — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<style>
  /* ── Dynamic Login Background ── */
  .login-bg {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(34,197,94,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(139,92,246,0.1) 0%, transparent 60%);
  }

  /* Floating icons */
  .float-icon {
    position: absolute; opacity: 0.2; font-size: 36px;
    animation: floatUp linear infinite;
    pointer-events: none; user-select: none;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg) scale(0.6); opacity: 0; }
    10% { opacity: 0.2; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-100px) rotate(360deg) scale(1); opacity: 0; }
  }

  /* Glowing orbs */
  .glow-orb {
    position: absolute; border-radius: 50%; filter: blur(80px);
    animation: orbFloat ease-in-out infinite;
    pointer-events: none;
  }
  .glow-orb.green { width: 350px; height: 350px; background: rgba(34,197,94,0.25); top: 10%; left: 10%; animation-duration: 8s; }
  .glow-orb.blue { width: 300px; height: 300px; background: rgba(59,130,246,0.25); bottom: 15%; right: 10%; animation-duration: 10s; animation-delay: 2s; }
  .glow-orb.purple { width: 250px; height: 250px; background: rgba(139,92,246,0.18); top: 50%; left: 60%; animation-duration: 12s; animation-delay: 4s; }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -20px) scale(1.1); }
    50% { transform: translate(-20px, 20px) scale(0.95); }
    75% { transform: translate(15px, 10px) scale(1.05); }
  }

  /* Grid pattern overlay */
  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridShift 20s linear infinite;
  }
  [data-theme="light"] .grid-overlay {
    background-image:
      linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
  }
  @keyframes gridShift { 0% { transform: translate(0,0); } 100% { transform: translate(60px,60px); } }

  [data-theme="light"] .float-icon { opacity: 0.15; }
  [data-theme="light"] .glow-orb.green { background: rgba(34,197,94,0.15); }
  [data-theme="light"] .glow-orb.blue { background: rgba(59,130,246,0.15); }
  [data-theme="light"] .glow-orb.purple { background: rgba(139,92,246,0.1); }

  .login-container { position: relative; z-index: 1; }
</style>

<!-- Animated Background -->
<div class="login-bg">
  <div class="grid-overlay"></div>
  <div class="glow-orb green"></div>
  <div class="glow-orb blue"></div>
  <div class="glow-orb purple"></div>
</div>

<script>
  // Spawn floating delivery icons
  (function() {
    const icons = ['📦', '🚚', '✅', '🛒', '📋', '🏷️', '📬', '🎯', '⭐', '💳'];
    const bg = document.querySelector('.login-bg');
    function spawn() {
      const el = document.createElement('div');
      el.className = 'float-icon';
      el.textContent = icons[Math.floor(Math.random() * icons.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.fontSize = (24 + Math.random() * 28) + 'px';
      el.style.animationDuration = (12 + Math.random() * 18) + 's';
      el.style.animationDelay = Math.random() * 2 + 's';
      bg.appendChild(el);
      setTimeout(() => el.remove(), 32000);
    }
    for (let i = 0; i < 12; i++) setTimeout(spawn, i * 800);
    setInterval(spawn, 2500);
  })();
</script>

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
    </div>
    <h1 class="login-title">Order Tracking System</h1>
    <p class="login-subtitle" id="login-subtitle">Sign in to your account</p>

    <!-- Role Selector -->
    <div class="role-selector">
      <button class="role-btn active" id="role-user" onclick="selectRole('user')">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        User
      </button>
      <button class="role-btn" id="role-shopkeeper" onclick="selectRole('shopkeeper')">
        <svg viewBox="0 0 24 24"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/></svg>
        Shopkeeper
      </button>
    </div>

    <form id="login-form" onsubmit="handleAuth(event)">
      <!-- Name (register only) -->
      <div class="form-group" id="name-group" style="display:none;">
        <label class="form-label">Full Name</label>
        <div class="input-icon-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
          <input class="form-input" type="text" id="auth-name" placeholder="Your full name" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <input class="form-input" type="text" id="auth-username" placeholder="Enter username" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          <input class="form-input" type="password" id="auth-password" placeholder="••••••••" required />
        </div>
      </div>

      <div id="auth-error" class="error-msg" style="display:none;"></div>

      <button type="submit" class="btn-primary btn-full" id="auth-btn">
        <span>Sign In</span>
        <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </button>
    </form>

    <div class="auth-toggle">
      <span id="toggle-text">Don't have an account?</span>
      <a href="#" id="toggle-link" onclick="toggleMode(event)">Register</a>
    </div>

    <div class="credentials-hint" id="hint">
      <p>Demo Accounts</p>
      <span>User: sai / sai123 &nbsp;•&nbsp; Shopkeeper: admin / admin123</span>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" id="toast-icon"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
  <span id="toast-msg"></span>
</div>

<script src="/app.js"></script>
</body>
</html>
